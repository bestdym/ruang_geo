name: ruang_geo
description: "Ruang-Geo - Aplikasi Edukasi Geometri dengan AR untuk Bangun Ruang & Bangun Datar"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # State Management - BLoC
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^15.1.2

  # Dependency Injection
  get_it: ^8.0.3

  # Network
  dio: ^5.8.0+1

  # Local Storage
  shared_preferences: ^2.5.3

  # Utils
  intl: ^0.20.2
  logger: ^2.5.0

  # UI & Fonts
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  fl_chart: ^0.71.0

  # 3D Model Viewer
  model_viewer_plus: ^1.7.0

  # AR Integration (placeholder - aktifkan saat siap Unity)
  # flutter_unity_widget: ^2022.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/
    - assets/models/bangun_ruang/
    - assets/models/bangun_datar/

  # Font Poppins di-load via google_fonts package (tidak perlu file lokal)
  # Untuk produksi/offline, download dari fonts.google.com lalu uncomment blok ini
