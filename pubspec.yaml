name: ruang_geo
description: "Ruang-Geo - Aplikasi Edukasi Geometri dengan AR untuk Bangun Ruang & Bangun Datar"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State Management  
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # 3D Viewer
  model_viewer_plus: ^1.7.0

  # AR
  ar_flutter_plugin: ^0.7.3

  # Animasi
  flutter_animate: ^4.3.0
  rive: ^0.12.4

  # Kamera & Permission
  permission_handler: ^11.0.0
  camera: ^0.10.5

  # UI Utils
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0

  # Storage lokal (untuk favorit & progress kuis)
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0

  # Supabase & QR
  supabase_flutter: ^2.3.4
  mobile_scanner: ^5.0.0

  # Math formula display
  flutter_math_fork: ^0.7.2
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/
    - assets/models/bangun_ruang/
    - assets/models/bangun_datar/

  # Font Poppins di-load via google_fonts package (tidak perlu file lokal)
  # Untuk produksi/offline, download dari fonts.google.com lalu uncomment blok ini

dependency_overrides:
  permission_handler: ^11.0.0